name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    # 設計意図: CI 上では Supabase CLI(Docker)の起動コストを避け、
    # 統合テストの DB 接続先として素の Postgres コンテナを使用する。
    # RLS ポリシーの検証はローカル開発時の `npm run db:start`(Supabase Local)で行い、
    # CI ではテーブル制約・トランザクション・SQL 互換性のみを検証する方針。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    # NEXT_PUBLIC_SUPABASE_* は middleware / Server Component が createServerClient で
    # 構築時に要求するため、ビルド時 (Next.js が NEXT_PUBLIC_* をインライン化) と
    # ランタイム (npm run start) の両方で必要。CI では実 Supabase に接続しないため
    # 非空の placeholder を使う (createServerClient は文字列の空チェックしかしない。
    # auth.getUser() はネットワーク失敗を error として返すだけで例外を投げないため、
    # 未ログイン UI を検証する E2E は継続して動作する)。
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-not-a-real-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
