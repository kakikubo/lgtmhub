name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    # 設計意図: CI 上では Supabase CLI(Docker)の起動コストを避け、
    # 統合テストの DB 接続先として素の Postgres コンテナを使用する。
    # RLS ポリシーの検証はローカル開発時の `npm run db:start`(Supabase Local)で行い、
    # CI ではテーブル制約・トランザクション・SQL 互換性のみを検証する方針。
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      # 設計意図: test:unit / test:integration の 2 回実行をやめ、
      # test:coverage (= vitest run --coverage) の 1 パスに統合する。
      # vitest.config.ts の include/exclude により unit + integration を
      # まとめて実行し (e2e は対象外)、二重実行せずカバレッジを計測する。
      # 閾値判定は v8 の function 計測が Node マイナー差で数 % ブレ CI を
      # 不安定にするため CI ではゲートにしない (VITEST_DISABLE_THRESHOLDS)。
      # 可視化が目的で新規ゲート化はスコープ外。テスト失敗自体は閾値と
      # 無関係に vitest が非 0 終了するため test ジョブのゲートは維持される。
      - run: npm run test:coverage
        env:
          VITEST_DISABLE_THRESHOLDS: "true"
      # 設計意図: カバレッジを Codecov にアップロードし、PR / main で可視化する。
      # public リポジトリのため CODECOV_TOKEN が未設定でも tokenless で動作する。
      # 可視化が目的でアップロード可否を CI のゲートにしないため
      # fail_ci_if_error: false とし、Codecov 側の一時障害で test を落とさない。
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    # 設計意図: e2e ジョブでは supabase/setup-cli + supabase start で本物の
    # PostgreSQL + PostgREST + Auth + Storage を Docker で立ち上げ、Server Component
    # と Route Handler が実 DB を叩けるようにする。これにより HomePage / ImageDetailPage
    # の DATABASE_ERROR ログが出なくなり、後続 PR でログイン済みフロー E2E を書く
    # 土台が整う。NEXT_PUBLIC_* は build 時にインライン化されるため、必ず
    # `npm run build` の前に `$GITHUB_ENV` 経由で注入する。
    env:
      # Supabase の auth.external.github は env() 参照を持つため、未設定だと起動時に
      # warning が出る。CI では OAuth コールバック試験を行わないので空文字を渡す
      GITHUB_OAUTH_CLIENT_ID: ""
      GITHUB_OAUTH_CLIENT_SECRET: ""
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - uses: supabase/setup-cli@v2.0.0
        with:
          version: 2.98.0
      - name: Start Supabase Local
        run: supabase start
      - name: Export Supabase env to GITHUB_ENV
        run: |
          set -euo pipefail
          status=$(supabase status -o json)
          api_url=$(echo "$status" | jq -er '.API_URL')
          anon_key=$(echo "$status" | jq -er '.ANON_KEY')
          service_role_key=$(echo "$status" | jq -er '.SERVICE_ROLE_KEY')
          echo "NEXT_PUBLIC_SUPABASE_URL=$api_url" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$anon_key" >> "$GITHUB_ENV"
          # globalSetup から admin API でテストユーザーを作るために必要
          echo "SUPABASE_SERVICE_ROLE_KEY=$service_role_key" >> "$GITHUB_ENV"
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # E2E_TEST_MODE は playwright.config.ts の webServer.env で webServer プロセスにのみ渡る。
      # 本番デプロイ環境変数には絶対に追加しないこと
      - run: npm run test:e2e
      - name: Stop Supabase Local
        if: always()
        run: supabase stop --no-backup

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
