name: Danger
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  danger:
    # 設計意図: 既存 ci.yml の lint/test/e2e と独立させ、Danger（GitHub API への
    # コメント書き込み）が落ちても他のジョブの結果に影響しないようにする。
    # 計測対象・除外ルール・閾値は docs/development-guidelines.md
    # 「PRの大きさの目安」と dangerfile.ts に集約する。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # danger@13 が内部で依存している node-fetch@2.7.0 は Node 24 ランナー上で
          # Gunzip ストリームの prematureClose を踏み、GitHub PR Files API のレスポンスを
          # 取得できず ERR_STREAM_PREMATURE_CLOSE で必ず失敗する (Issue #215)。
          # danger-js が undici 化されるまでの暫定回避として Node 22 (LTS) を固定する。
          node-version: "22"
          cache: "pnpm"
      # `package.json` の `engines.node: ">=24.0.0"` は本番アプリ実行環境 (Vercel) 向けで、
      # 本ジョブはアプリビルド/起動を行わず danger CLI を回すだけのため engine-strict を外す。
      - run: pnpm install --frozen-lockfile --config.engine-strict=false
      - run: pnpm exec danger ci --failOnErrors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
