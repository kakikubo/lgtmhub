name: Supabase Deploy

# main ブランチに supabase/migrations/ または supabase/config.toml の変更がマージされたとき、
# リモート Supabase に DDL と config (Auth など) を自動 push する。
# 本番 (lgtm2 / 東京) と Preview (lgtmhub-preview / 東京) の 2 プロジェクトを対象とする。
#
# 背景: PR #35 で「ローカルで動くがリモートに未反映」の事故が発生した。
#       手動 `supabase db push` / `supabase config push` の運用に依存していた箇所を CI に置換する。
#
# トリガー方針: pull_request では起動しない (フォーク PR からの secrets 露出回避)。
#               main マージ後の push のみで動かし、失敗時は workflow_dispatch で再実行する。
#
# 実処理は _supabase-push.yml (再利用ワークフロー) に集約し、prod / preview それぞれの
# secrets を渡して呼び出す。prod / preview は別 DB のため並列実行で問題ない。

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
  workflow_dispatch:

permissions:
  contents: read

# 並走させると schema_migrations の部分適用が起きうるので Deploy 実行自体を直列化する。
# 実行中を途中で殺すと中途半端に終わるため cancel-in-progress: false。
concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  prod:
    uses: ./.github/workflows/_supabase-push.yml
    with:
      remote_name: prod
    secrets:
      access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      project_ref: ${{ secrets.SUPABASE_PROJECT_REF }}
      db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
      gh_oauth_id: ${{ secrets.SUPABASE_GITHUB_OAUTH_CLIENT_ID }}
      gh_oauth_secret: ${{ secrets.SUPABASE_GITHUB_OAUTH_CLIENT_SECRET }}

  # Preview DB への push。Preview プロジェクト作成 + secrets 登録が済むまでは
  # リポジトリ変数 PREVIEW_DB_ENABLED を未設定 (= 'true' 以外) にしておけば skip される。
  # 準備完了後に Settings > Secrets and variables > Actions > Variables で
  # PREVIEW_DB_ENABLED=true を設定すると prod と並んで自動 push されるようになる。
  preview:
    if: ${{ vars.PREVIEW_DB_ENABLED == 'true' }}
    uses: ./.github/workflows/_supabase-push.yml
    with:
      remote_name: preview
    secrets:
      access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      project_ref: ${{ secrets.SUPABASE_PREVIEW_PROJECT_REF }}
      db_password: ${{ secrets.SUPABASE_PREVIEW_DB_PASSWORD }}
      gh_oauth_id: ${{ secrets.SUPABASE_PREVIEW_GITHUB_OAUTH_CLIENT_ID }}
      gh_oauth_secret: ${{ secrets.SUPABASE_PREVIEW_GITHUB_OAUTH_CLIENT_SECRET }}
