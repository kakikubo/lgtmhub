name: Supabase Deploy

# main ブランチに supabase/migrations/ または supabase/config.toml の変更がマージされたとき、
# リモート Supabase (lgtm2 / 東京 ap-northeast-1) に DDL と config (Auth など) を自動 push する。
#
# 背景: PR #35 で「ローカルで動くがリモートに未反映」の事故が発生した。
#       手動 `supabase db push` / `supabase config push` の運用に依存していた箇所を CI に置換する。
#
# トリガー方針: pull_request では起動しない (フォーク PR からの secrets 露出回避)。
#               main マージ後の push のみで動かし、失敗時は workflow_dispatch で再実行する。

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
  workflow_dispatch:

permissions:
  contents: read

# 並走させると schema_migrations の部分適用が起きうるので直列化する。
# 実行中を途中で殺すと中途半端に終わるため cancel-in-progress: false。
concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      # supabase CLI が認証に使う。--password フラグだとログ事故が起きうるので env で渡す。
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2.1.1
        with:
          # ローカル開発環境および ci.yml の e2e ジョブと揃える
          version: 2.98.0

      - name: Link to remote project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      # 何が pending かをログに残す (db push の前後比較用)
      - name: Show pending migrations
        run: supabase migration list --linked

      - name: Push migrations
        run: supabase db push --linked

      # config.toml (Auth など) をリモートへ反映する。
      # 本番値は config.toml の [remotes.prod] が project_id 一致で適用する。
      - name: Push config
        # config push は config.toml 全体をパースし env() を解決する。
        # 本番 GitHub OAuth は実値、disabled / local 専用の参照は空文字で渡しパース失敗を防ぐ
        # (disabled なため適用はされない)。
        # secret 名は GITHUB_ プレフィックス禁止のため SUPABASE_GITHUB_OAUTH_* とし、
        # config.toml が参照する env 名 (GITHUB_OAUTH_*) にマップする。
        env:
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.SUPABASE_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_GITHUB_OAUTH_CLIENT_SECRET }}
          OPENAI_API_KEY: ''
          SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: ''
          SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: ''
          S3_HOST: ''
          S3_REGION: ''
          S3_ACCESS_KEY: ''
          S3_SECRET_KEY: ''
        # 非対話実行では [Y/n] プロンプトを明示的に承認する(暗黙の自動 Yes 依存を避ける)。
        run: supabase config push --yes
